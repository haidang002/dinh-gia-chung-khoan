<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định Giá Chứng Khoán 2024</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-gradient-to-r from-orange-500 to-red-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-tighter">Hệ Thống Định Giá Thông Minh</h1>
        </div>

        <div class="p-6">
            <div class="flex gap-2 mb-4">
                <input type="text" id="symbol" placeholder="Nhập mã (VD: HPG, VCB)" 
                    class="flex-1 p-3 border-2 border-gray-100 rounded-xl focus:border-orange-500 outline-none uppercase font-bold text-lg">
                <button onclick="fetchData()" id="btnCheck"
                    class="bg-orange-600 text-white px-6 rounded-xl hover:bg-orange-700 transition font-bold">
                    TÍNH
                </button>
            </div>

            <div id="loading" class="hidden text-center py-4 text-orange-600 font-medium italic">
                🔄 Đang kết nối dữ liệu sàn...
            </div>

            <div id="resultArea" class="hidden animate-in fade-in duration-500">
                <div class="text-center p-4 bg-gray-50 rounded-2xl mb-4">
                    <span class="text-gray-400 text-xs font-bold">GIÁ TRỊ THỰC THEO TÀI SẢN</span>
                    <div id="intrinsicValue" class="text-4xl font-black text-red-600">0</div>
                    <div id="marketPriceDisplay" class="text-sm text-gray-500 mt-1 font-semibold"></div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between p-3 bg-green-50 rounded-lg">
                        <span class="text-gray-600">Biên an toàn (Mua rẻ)</span>
                        <span id="capGain" class="font-bold text-green-700">0%</span>
                    </div>
                    <div class="flex justify-between p-3 bg-blue-50 rounded-lg">
                        <span class="text-gray-600">Tăng trưởng kỳ vọng/năm</span>
                        <span class="font-bold text-blue-700">19.12%</span>
                    </div>
                    <div class="p-4 bg-red-600 rounded-xl text-white shadow-lg">
                        <div class="text-[10px] opacity-80 uppercase font-bold">Lợi ích kỳ vọng 5 năm</div>
                        <div id="fiveYearBenefit" class="text-3xl font-black italic">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const symbol = document.getElementById('symbol').value.trim().toUpperCase();
            if (!symbol) return;

            const btn = document.getElementById('btnCheck');
            const loader = document.getElementById('loading');
            const results = document.getElementById('resultArea');

            btn.disabled = true;
            loader.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                // Sử dụng API của SSI thông qua một nguồn dữ liệu thứ 3 ổn định hơn
                const response = await fetch(`https://cors-anywhere.herokuapp.com/https://api.vietstock.vn/ta/getstockinfo?symbol=${symbol}`, {
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });
                
                // Nếu nguồn trên lỗi, ta dùng nguồn dự phòng (Sử dụng dữ liệu tài chính giả lập cho demo nếu API gốc bị chặn)
                // Trong môi trường GitHub Pages, bạn nên đăng ký một Token API (như của FinnHub hoặc Vietstock) để ổn định 100%
                
                // Giả lập logic xử lý dữ liệu (Dựa trên thông
