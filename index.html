<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Gia Định Giá Chứng Khoán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #f3f4f6; }
        .input-group { border-bottom: 1px solid #eee; padding: 10px 0; }
        .label-custom { font-size: 11px; color: #999; font-weight: bold; text-transform: uppercase; }
        .value-input { width: 100%; border: none; outline: none; font-weight: bold; color: #333; font-size: 16px; background: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="p-6 space-y-2">
            <div class="input-group">
                <p class="label-custom">Vốn chủ sở hữu hiện tại (Tỷ đồng)</p>
                <input type="number" id="equity" value="67995.71" class="value-input">
            </div>
            <div class="input-group">
                <p class="label-custom">Thị giá cổ phiếu (Đồng/CP)</p>
                <input type="number" id="price" value="14750" class="value-input">
            </div>
            <div class="input-group">
                <p class="label-custom">Tổng số lượng cổ phiếu (Triệu CP)</p>
                <input type="number" id="shares" value="4594.2" class="value-input">
            </div>
            <div class="input-group">
                <p class="label-custom">Tăng giá trị hàng năm (%)</p>
                <input type="number" id="growth" value="19.12" class="value-input text-blue-600">
            </div>

            <button onclick="calculate()" class="w-full bg-[#b8860b] hover:bg-[#a0760a] text-white font-black py-4 rounded-xl mt-4 uppercase tracking-widest transition-all">
                ĐỊNH GIÁ
            </button>
        </div>

        <div id="result" class="bg-[#fffafa] p-8 border-t border-gray-100">
            <div class="text-center mb-6">
                <p class="text-[#999] text-[10px] font-black uppercase tracking-widest">GIÁ TRỊ THỰC</p>
