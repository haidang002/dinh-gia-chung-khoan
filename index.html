<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định Giá Cổ Phiếu Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-[2rem] card-shadow w-full max-w-md overflow-hidden border border-gray-100">
        <div class="gradient-bg p-8 text-center">
            <h1 class="text-white text-2xl font-black uppercase tracking-widest mb-1">ĐỊNH GIÁ</h1>
            <div id="stock-name" class="text-white/80 font-bold text-sm">NHẬP MÃ ĐỂ BẮT ĐẦU</div>
        </div>

        <div class="p-8">
            <div class="relative mb-6">
                <input type="text" id="symbol" placeholder="VD: HPG, VCB, FPT" 
                    class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-orange-400 rounded-2xl outline-none transition-all font-bold text-xl uppercase text-center shadow-inner">
            </div>

            <button onclick="smartCalculate()" id="btnAction"
                class="w-full bg-slate-900 hover:bg-black text-white font-black py-4 rounded-2xl transition-all active:scale-95 shadow-lg mb-8">
                PHÂN TÍCH DỮ LIỆU
            </button>

            <div id="resultArea" class="hidden space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                <div class="text-center">
                    <span class="text-gray-400 text-xs font-black uppercase tracking-widest">Giá Trị Thực Dự Tính</span>
                    <div id="intrinsicValue" class="text-5xl font-black text-slate-900 mt-1">0</div>
                    <div id="marketPriceDisplay" class="text-orange-500 font-bold mt-2 bg-orange-50 inline-block px-3 py-1 rounded-full text-sm"></div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                        <span class="text-gray-500 font-medium">Lãi vốn (Mua rẻ)</span>
                        <span id="capGain" class="font-black text-green-600 text-lg">+0%</span>
                    </div>
                    
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                        <span class="text-gray-500 font-medium">Tăng trưởng kỳ vọng</span>
                        <span class="font-black text-blue-600 text-lg">19.12%</span>
                    </div>

                    <div class="p-6 bg-red-500 rounded-[1.5rem] text-white relative overflow-hidden">
                        <div class="relative z-10">
                            <span class="text-[10px] font-black uppercase opacity-80">Tổng lợi ích 5 năm</span>
                            <div id="fiveYearBenefit" class="text-4xl font-black italic mt-1">+0%</div>
                        </div>
                        <div class="absolute -right-4 -bottom-4
